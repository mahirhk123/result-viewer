<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${student.name}">Marksheet</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gradient-to-r from-blue-500 via-purple-500 to-pink-500 min-h-screen flex items-center justify-center p-10">

<div class="bg-white rounded-xl shadow-xl w-full max-w-4xl p-10">

    <!-- Header -->
    <div class="flex justify-between items-center mb-6">

        <div>
            <h1 class="text-3xl font-bold text-blue-600">
                Student Marksheet
            </h1>
            <p class="text-gray-500">
                Academic Year: 2025-26
            </p>
        </div>

        <div class="w-20 h-20 border-2 border-blue-500 rounded-full overflow-hidden">
            <img src="https://humanrightsrilanka.org/wp-content/uploads/2019/04/iStock-476085198.jpg" alt="Student Photo"
                 class="w-full h-full object-cover">
        </div>

    </div>

    <hr class="mb-6">

    <!-- Student Details -->
    <div class="grid grid-cols-2 gap-6 text-sm mb-10">

        <div>
            <p><strong>Name:</strong> <span th:text="${student.name}"></span></p>
            <p><strong>Roll Number:</strong>
                <span th:text="${student.rollNumber}"></span>
            </p>
            <p><strong>Email:</strong>
                <span th:text="${student.email}"></span>
            </p>
            <br>
            <p><strong>Address:</strong>
                <span th:text="${student.address}"></span>
            </p>
            <p><strong>School:</strong>
                <span th:text="${student.schoolName}"></span>
            </p>
            <p><strong>Class:</strong>
                <span th:text="${student.standard}"></span>
            </p>
        </div>

        <div>
            <div>
                <p><strong>Date of Birth:</strong>
                    <span th:text="${student.dateOfBirth}"></span>
                </p>
                <p><strong>Gender:</strong>
                    <span th:text="${student.gender}"></span>
                </p>
                <p><strong>Father's Name:</strong>
                    <span th:text="${student.fatherName}"></span>
                </p>
        </div>
      </div>
    </div>

    <!-- Marks Section -->
    <h2 class="text-xl font-semibold mt-8 mb-4">
        Marks Obtained
    </h2>

    <table class="w-full border-collapse">

        <thead>
        <tr class="bg-blue-600 text-white text-left">
            <th class="p-3">Subject</th>
            <th class="p-3">Marks</th>
            <th class="p-3">Full Marks</th>
            <th class="p-3">Grade</th>
            <th class="p-3">Feedback</th>
        </tr>
        </thead>

        <tbody class="text-gray-700">

        <tr th:each="mark: ${marks}" class="border-b">
            <td class="p-3"><span th:text="${mark.subjectName}"></span></td>
            <td class="p-3"><span th:text="${mark.marks}"></span></td>
            <td class="p-3"><span th:text="${mark.fullMarks}"></span></td>
            <td class="p-3 text-green-600 font-semibold"><span th:text="${mark.grade}"></span></td>
            <td class="p-3"><span th:text="${mark.feedback}"></span></td>
        </tr>


        </tbody>

    </table>

    <!-- Result Summary -->
    <div class="mt-6 text-sm space-y-1">

        <p><strong>Total Marks:</strong> <span th:text="${totalMarks}"></span>/<span th:text="${totalMaxMarks}"> </span> </p>
        <p><strong>Percentage:</strong> <span th:text="${percentage}"> </span></p>
        <p><strong>Result:</strong> <span class="text-green-600 font-semibold">
            <span th:text="${passed ? 'Passed':'Fail'}"></span>
        </span></p>

    </div>

    <!-- Footer -->
    <div >
        <p class="text-center text-gray-400 text-sm mt-10">
            <span th:text="${currentDate}"> </span>
        </p>
    </div>

<div class="flex justify-center gap-4 mt-6">
    <a th:href="@{/view-result}" type="button" class="text-white bg-gradient-to-r from-blue-500 via-blue-600 to-blue-700 hover:bg-gradient-to-br focus:ring-4 focus:outline-none focus:ring-blue-300 dark:focus:ring-blue-800 font-medium rounded-base text-sm px-4 py-2.5 text-center leading-5">View Another</a>
    <button onclick="printResult()" type="button" class="text-white bg-gradient-to-r from-green-400 via-green-500 to-green-600 hover:bg-gradient-to-br focus:ring-4 focus:outline-none focus:ring-green-300 dark:focus:ring-green-800 font-medium rounded-base text-sm px-4 py-2.5 text-center leading-5">Print Result</button>

    </div>

</div>

<script>
    function printResult() {
        window.print()
    }
</script>

</body>
</html>
