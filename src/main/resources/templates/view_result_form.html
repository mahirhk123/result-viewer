<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Result</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gradient-to-r from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center">

<!-- Result Card -->
<div class="bg-white shadow-xl rounded-2xl p-10 w-full max-w-md">

    <!-- Title -->
    <h1 class="text-3xl font-bold text-center text-indigo-600">
        Result Viewer
    </h1>

    <!-- Subtitle -->
    <p class="text-gray-500 text-center mt-2 mb-8">
        Enter your Roll Number and Date of Birth to check your examination result
    </p>

    <!-- Form -->
    <form novalidate class="space-y-5" th:action="@{/view-result-action}" th:object="${requestResultForm}" method="post">

        <!-- Roll Number -->
        <div class="mb-4">
            <label class="block text-sm font-semibold text-gray-700 mb-1">Roll Number</label>
            <input
                    th:field="*{rollNumber}"
                    type="text"
                    placeholder="Enter your roll number"
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400"
            >
            <span class="text-red-700 p-2" th:if="${#fields.hasErrors('rollNumber')}" th:errors="*{rollNumber}"></span>
        </div>

        <!-- Date of Birth -->
        <div class="mb-4">
            <label class="block text-sm font-semibold text-gray-700 mb-1">Date of Birth</label>
            <input
                    th:field="*{dateOfBirth}"
                    type="date"
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400"
            >
            <span class="text-red-700 p-2" th:if="${#fields.hasErrors('dateOfBirth')}" th:errors="*{dateOfBirth}"></span>
        </div>

        <!-- Submit Button -->
        <button
                type="submit"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 rounded-lg transition duration-200"
        >
            View Result
        </button>

    </form>

</div>

</body>
</html>
